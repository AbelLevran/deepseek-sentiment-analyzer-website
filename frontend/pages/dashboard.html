<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DeepSentiment</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="bg-animation"></div>

    <nav>
        <a href="../index.html" class="logo">DeepSentiment</a>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="single.html">Single Predict</a>
            <a href="batch.html">Batch Predict</a>
        </div>
    </nav>

    <main>
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
                <h2>DeepSeek AI Reviews Insights</h2>
                <div id="totalReviews" style="font-size: 1.2rem; font-weight: 600; color: var(--primary);">Total
                    Reviews: 0</div>
            </div>

            <div class="loader" id="loader" style="display: block;"></div>

            <div id="dashboardContent" style="display: none;">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
                    <!-- Pie Chart -->
                    <div
                        style="background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 0.5rem; text-align: center;">
                        <h3 style="margin-bottom: 1rem; color: var(--text-muted)">Sentiment Distribution</h3>
                        <div class="chart-container" style="max-width: 300px;">
                            <canvas id="pieChart"></canvas>
                        </div>
                    </div>

                    <!-- Stats summary -->
                    <div style="background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 0.5rem;">
                        <h3 style="margin-bottom: 1rem; color: var(--text-muted)">Summary</h3>
                        <div style="display: flex; flex-direction: column; gap: 1rem;">
                            <div
                                style="display: flex; justify-content: space-between; padding: 1rem; background: rgba(16, 185, 129, 0.1); border-radius: 0.5rem;">
                                <span style="color: var(--success); font-weight: bold;">Positif</span>
                                <span id="statPositif" style="font-weight: 600;">0%</span>
                            </div>
                            <div
                                style="display: flex; justify-content: space-between; padding: 1rem; background: rgba(239, 68, 68, 0.1); border-radius: 0.5rem;">
                                <span style="color: var(--danger); font-weight: bold;">Negatif</span>
                                <span id="statNegatif" style="font-weight: 600;">0%</span>
                            </div>
                            <div
                                style="display: flex; justify-content: space-between; padding: 1rem; background: rgba(100, 116, 139, 0.1); border-radius: 0.5rem;">
                                <span style="color: var(--neutral); font-weight: bold;">Netral</span>
                                <span id="statNetral" style="font-weight: 600;">0%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/dashboard.js"></script>
</body>

</html>
