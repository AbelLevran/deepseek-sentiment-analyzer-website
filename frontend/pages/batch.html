<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Prediction - DeepSentiment</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="bg-animation"></div>

    <nav>
        <a href="../index.html" class="logo">DeepSentiment</a>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="single.html">Single Predict</a>
            <a href="batch.html" class="active">Batch Predict</a>
        </div>
    </nav>

    <main>
        <div class="glass-card">
            <h2>Batch Prediction</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Upload a CSV file containing a "content" column,
                or paste multiple reviews separated by newlines.</p>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <div>
                    <div class="form-group">
                        <label>Upload CSV File</label>
                        <input type="file" id="csvFile" accept=".csv">
                        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;">File must have a
                            header. First text-like column or "content" column will be used.</p>
                    </div>
                </div>
                <div>
                    <div class="form-group">
                        <label>Or Paste Text (One review per line)</label>
                        <textarea id="batchTextInput" rows="4"
                            placeholder="Review 1&#10;Review 2&#10;Review 3"></textarea>
                    </div>
                </div>
            </div>

            <button id="analyzeBatchBtn" class="btn btn-primary">Run Batch Analysis</button>
            <div class="loader" id="loader" style="margin-top: 1rem;"></div>

            <div id="resultsArea" style="display: none; margin-top: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>Results</h3>
                    <button id="downloadBtn" class="btn btn-outline"
                        style="padding: 0.5rem 1rem; font-size: 0.9rem;">Download CSV</button>
                </div>

                <div style="overflow-x: auto; max-height: 400px; overflow-y: auto; margin-top: 1rem;">
                    <table class="data-table" id="resultsTable">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Text</th>
                                <th>Sentiment</th>
                                <th>Score</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <!-- Simple CSV parser library -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="../js/batch.js"></script>
</body>

</html>
